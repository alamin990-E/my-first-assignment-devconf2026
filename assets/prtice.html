<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .hero-container{
    max-width: 1200px;
    margin: 0 auto;

    height: 90vh;

    background-image:
    linear-gradient(rgba(0,0,0,.6), rgba(0,0,0,.6)),
    url("images/hero.jpg");

    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
}

.hero-content{
    display: flex;
    flex-direction: column;
    align-items: center;

    text-align: center;

    padding-top: 90px;
}

.hero-text{
    max-width: 600px;
    color: #fff;
}

.hero-btn{
    margin-top: 70px;
}
.common-button {
  background-color: #1d4ed8;
  color: white;
  padding: 10px 22px;
  border-radius: 8px;
  border: none;
  font-weight: 700;
  cursor: pointer;
}
    </style>
</head>
<body>
    <header class="hero">

    <div class="hero-container">

        <div class="hero-content">

            <div class="hero-text">
                <h1>Code. Connect. Create.</h1>

                <p>
                    Join 4,000+ engineers, founders, and builders at the premier developer conference.
                </p>
            </div>

            <div class="hero-btn">
                <button class="common-button">Register Now</button>
            </div>

        </div>

    </div>

</header>
</body>
</html>
